spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:competition_system_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: optional:file:../database/schema.sql
      data-locations: optional:file:../database/init.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: competition-system-demo-secret-key-2026-change-me
  expiration-minutes: 720
