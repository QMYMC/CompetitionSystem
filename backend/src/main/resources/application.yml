server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: competition-system-backend
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: optional:file:../database/schema.sql
      data-locations: optional:file:../database/init.sql

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: competition-system-demo-secret-key-2026-change-me
  expiration-minutes: 720
